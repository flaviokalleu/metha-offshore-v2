# Site do nginx NATIVO do host (não Docker) para o Metha Offshore v2.
# Instalar em /etc/nginx/sites-available/metha-offshore e criar symlink em sites-enabled.
# Não conflita com os sites existentes (metha, zaaps-*) — usa porta própria (8081).
server {
    listen 8081;
    server_name 168.231.97.94;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
